<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merci — Week-end Océanique</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Source Sans 3', -apple-system, sans-serif;
      background: #f5f0e8;
      color: #1e3a4a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #fff;
      max-width: 480px;
      width: 100%;
      border-radius: 8px;
      padding: 48px 36px;
      text-align: center;
      box-shadow: 0 2px 24px rgba(30,58,74,0.08);
    }
    .check {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #2b6b6e;
      color: #fff;
      font-size: 32px;
      line-height: 64px;
      margin: 0 auto 20px;
    }
    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 32px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    p {
      font-size: 16px;
      color: #5a7a8a;
      line-height: 1.5;
      margin-bottom: 20px;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #2b6b6e;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h1>Merci !</h1>
    <p>Votre demande d'inscription a bien été envoyée.<br>
    Laurence vous recontactera dans les plus brefs délais pour finaliser votre réservation.</p>
    <p style="font-size:14px;color:#6b8a92;">
      À très bientôt à Noirmoutier 🌊
    </p>
  </div>
</body>
</html>
